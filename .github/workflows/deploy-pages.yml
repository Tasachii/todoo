# Deploys the standalone web app (data lives in the visitor's browser) to
# GitHub Pages on every push to main.
#
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '23'
          cache: npm
      - run: npm ci
      - name: Build standalone app under the repo subpath
        run: npm run build -w @todoo/web
        env:
          VITE_STANDALONE: '1'
          VITE_BASE: /${{ github.event.repository.name }}/
      - name: SPA fallback for deep links
        run: cp packages/web/dist/index.html packages/web/dist/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/web/dist
      - id: deployment
        uses: actions/deploy-pages@v4
